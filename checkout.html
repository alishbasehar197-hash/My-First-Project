<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - SAAIA Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #FDF7F9; 
            color: #4c1d95;
            padding: 20px;
        }
        
        .checkout-container { 
            max-width: 1100px; 
            margin: 30px auto; 
            display: flex; 
            gap: 30px;
            align-items: flex-start;
        }
        
        .billing-form, .order-summary { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(76, 29, 149, 0.08);
            border: 1px solid #e0d4f7;
        }
        
        .billing-form { flex: 2; }
        .order-summary { flex: 1; position: sticky; top: 20px; }
        
        h1 { 
            color: #4c1d95; 
            text-align: center; 
            margin-bottom: 30px; 
            font-size: 32px;
        }
        
        h2 { 
            color: #b8860b; 
            margin-bottom: 20px; 
            font-size: 22px;
            border-bottom: 2px solid #e0d4f7;
            padding-bottom: 10px;
        }
        
        .form-row { display: flex; gap: 15px; }
        
        .form-group { flex: 1; margin-bottom: 20px; }
        
        .form-group label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            font-size: 14px;
            color: #4c1d95;
        }
        
        .form-group input, .form-group textarea, .form-group select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #e0d4f7; 
            border-radius: 8px; 
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
        }
        
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #b8860b;
        }
        
        .required { color: #dc3545; }
        
        .order-item { 
            display: flex; 
            justify-content: space-between; 
            margin: 12px 0; 
            font-size: 15px;
        }
        
        .order-item-name { color: #555; }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            padding: 10px 0;
        }
        
        .summary-total {
            border-top: 2px solid #e0d4f7;
            font-weight: bold;
            font-size: 20px;
            color: #4c1d95;
        }
        
        .place-order-btn {
            width: 100%; 
            background: #4c1d95; 
            color: white; 
            padding: 16px; 
            border: none; 
            border-radius: 8px; 
            font-size: 17px; 
            font-weight: 600; 
            cursor: pointer; 
            margin-top: 20px;
            transition: 0.3s;
        }
        
        .place-order-btn:hover { 
            background: #b8860b; 
            transform: translateY(-2px);
        }
        
        .place-order-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .empty-cart-msg {
            text-align: center;
            padding: 40px;
            color: #777;
        }
        
        .back-to-shop {
            display: inline-block;
            margin-top: 15px;
            color: #b8860b;
            text-decoration: none;
            font-weight: 600;
        }
        
        .back-to-shop:hover {
            color: #4c1d95;
        }
        
        .success-btn {
            margin-top: 25px; 
            padding: 14px 30px; 
            background: #4c1d95; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer;
            transition: 0.3s;
        }
        
        .success-btn:hover {
            background: #b8860b;
            transform: translateY(-2px);
        }
        
        @media(max-width: 768px) {
            .checkout-container { flex-direction: column-reverse; }
            .form-row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>

    <h1>Checkout</h1>
    
    <div class="checkout-container">
        <!-- Left: Customer Form -->
        <div class="billing-form" id="billingForm">
            <h2>Billing Details</h2>
            <form id="checkoutForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name <span class="required">*</span></label>
                        <input type="text" id="firstName" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name <span class="required">*</span></label>
                        <input type="text" id="lastName" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Phone Number <span class="required">*</span></label>
                    <input type="tel" id="phone" placeholder="03XX-XXXXXXX" required>
                </div>

                <div class="form-group">
                    <label>Email Address <span class="required">*</span></label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-group">
                    <label>City <span class="required">*</span></label>
                    <select id="city" required>
                        <option value="">Select City</option>
                        <option value="Lahore">Lahore</option>
                        <option value="Karachi">Karachi</option>
                        <option value="Islamabad">Islamabad</option>
                        <option value="Rawalpindi">Rawalpindi</option>
                        <option value="Faisalabad">Faisalabad</option>
                        <option value="Multan">Multan</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Complete Address <span class="required">*</span></label>
                    <textarea id="address" rows="3" placeholder="House #, Street, Area" required></textarea>
                </div>

                <div class="form-group">
                    <label>Order Notes (Optional)</label>
                    <textarea id="notes" rows="2" placeholder="Special instructions for delivery..."></textarea>
                </div>

                <button type="submit" class="place-order-btn" id="placeOrderBtn">
                    Place Order - Cash on Delivery
                </button>
            </form>
        </div>

        <!-- Right: Order Summary -->
        <div class="order-summary">
            <h2>Your Order</h2>
            <div id="orderItemsList">
                <!-- JS se items aayenge -->
            </div>
            
            <div class="summary-row">
                <span>Subtotal:</span>
                <span id="subtotal">PKR 0</span>
            </div>
            <div class="summary-row">
                <span>Shipping:</span>
                <span id="shipping">PKR 200</span>
            </div>
            <div class="summary-row summary-total">
                <span>Total:</span>
                <span id="total">PKR 200</span>
            </div>
        </div>
    </div>

<script>
    const SHIPPING_CHARGE = 200;

    document.addEventListener('DOMContentLoaded', function() {
        loadOrderSummary();
    });

    function loadOrderSummary() {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let orderList = document.getElementById('orderItemsList');
        let subtotal = 0;

        if(cart.length === 0) {
            orderList.innerHTML = `
                <div class="empty-cart-msg">
                    <p>Your cart is empty</p>
                    
                </div>
            `;
            document.getElementById('placeOrderBtn').disabled = true;
            document.getElementById('subtotal').innerText = 'PKR 0';
            document.getElementById('shipping').innerText = 'PKR 0';
            document.getElementById('total').innerText = 'PKR 0';
            return;
        }

        orderList.innerHTML = '';
        cart.forEach(item => {
            let itemTotal = item.price * item.qty;
            subtotal += itemTotal;
            
            orderList.innerHTML += `
                <div class="order-item">
                    <span class="order-item-name">${item.name || 'Product'} × ${item.qty}</span>
                    <span>PKR ${itemTotal.toLocaleString()}</span>
                </div>
            `;
        });

        let total = subtotal + SHIPPING_CHARGE;
        document.getElementById('subtotal').innerText = `PKR ${subtotal.toLocaleString()}`;
        document.getElementById('shipping').innerText = `PKR ${SHIPPING_CHARGE.toLocaleString()}`;
        document.getElementById('total').innerText = `PKR ${total.toLocaleString()}`;
    }

    document.getElementById('checkoutForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    
    if(cart.length === 0) {
        alert('Your cart is empty!');
        return;
    }

    let subtotalCalc = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

    let orderData = {
        customer: {
            name: document.getElementById('firstName').value + ' ' + document.getElementById('lastName').value,
            phone: document.getElementById('phone').value,
            email: document.getElementById('email').value,
            city: document.getElementById('city').value,
            address: document.getElementById('address').value,
            notes: document.getElementById('notes').value
        },

        items: cart,
        subtotal: subtotalCalc,
        shipping: SHIPPING_CHARGE,
        total: subtotalCalc + SHIPPING_CHARGE,
        date: new Date().toLocaleDateString(),
        time: new Date().toLocaleTimeString(),
        orderId: 'ORD-' + Date.now(),
        status: 'Pending'
    };

    let orders = JSON.parse(localStorage.getItem('orders')) || [];
    orders.push(orderData);
    localStorage.setItem('orders', JSON.stringify(orders));

    alert('Order Placed Successfully! Order ID: ' + orderData.orderId);

    document.getElementById('billingForm').innerHTML = `
        <div style="text-align:center; padding:40px 20px;">
            <i class="fa-solid fa-circle-check" style="font-size:60px; color:#4c1d95; margin-bottom:20px;"></i>

            <h2 style="color:#4c1d95; margin-bottom:10px;">
                Order Placed Successfully! ✅
            </h2>

            <p style="font-size:16px; margin-bottom:5px;">
                Order ID: <strong>${orderData.orderId}</strong>
            </p>

            <p style="font-size:16px; margin-bottom:20px;">
                Total:
                <strong style="color:#b8860b;">
                    PKR ${orderData.total.toLocaleString()}
                </strong>
            </p>

            <p>We will contact you soon!</p>

            <button onclick="window.location.href='collection.html'" class="success-btn">
                Continue Shopping
            </button>
        </div>
    `;

    localStorage.removeItem('cart');
    loadOrderSummary();
});
</script>

</body>
</html>
