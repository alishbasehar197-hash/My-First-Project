<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAAIA Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
         * {
             margin: 0;
              padding: 0; 
              box-sizing: border-box;
             }
        body
         { font-family: 'Poppins', sans-serif; 
         color: #4c1d95;
          background:#FDF7F9;
         }
        h1, h2, h3 {
             font-family: 'Playfair Display', serif; 
            }
       .navbar { 
        display: flex; 
        justify-content: space-between;
         align-items: center;
          padding: 18px 5%;
           background:#FDF7F9;
            border-bottom: 1px solid #b8860b;
             position: sticky;
              top: 0; 
              z-index: 100; 
            }
       .logo {
         display: flex;
          align-items: center; 
          gap: 10px;
         }
       .logo img {
         height: 50px;
          border-radius: 8px;
         }
        h2 {
             color:#4c1d95;
             }
       .nav-links {
         display: flex; 
         gap: 35px; 
        }
       .nav-links a {
         text-decoration: none; 
         color: #333;
          font-weight: 500;
           font-size: 15px;
            padding-bottom: 3px;
             border-bottom: 2px solid transparent;
              transition: all 0.3s ease;
             }
       .nav-links a:hover {
         color: #b8860b!important; 
         
         border-bottom: 2px solid #b8860b!important;
         }
       .cart {
         position: relative; 
        }
       .cart-link {
         color: #b8860b; 
         font-size: 20px; 
         transition: 0.3s;
         }
       .cart-link:hover {
         color: #4c1d95;
         }
       .cart-count { 
        background:#4c1d95; 
        color: white;
         border: 2px solid #FDF7F9;
          border-radius: 50%;
           width: 20px;
            height: 20px;
             font-weight: bold;
              font-size: 11px;
               display: flex;
                align-items: center;
                 justify-content: center;
                  position: absolute; 
                  top: -8px;
                   right: -10px;
                 }
       .hero { 
        position: relative;
         text-align: center; 
         padding: 100px 5%;
          color: #4c1d95; 
          overflow: hidden;
           height: 550px;
            display: flex;
             align-items: center; 
             justify-content: center;
             }
       .hero-video {
         position: absolute;
          top: 0; 
          left: 0; 
          width: 100%;
           height: 100%;
            object-fit: cover; 
        }
       .section-header {
         display: flex; 
         justify-content: center;
          align-items: center; 
          margin-bottom: 35px;
           flex-direction: column;
         }
       .section-title h3 {
         color: #b8860b; 
         font-size: 13px;
          letter-spacing: 2px; 
          font-weight: 600;
         }
       .section-title{ 
        text-align: center; 
    }
       .section-title h2 {
         color:#4c1d95;
          font-size: 36px;
           margin-top: 5px; 
        }
       .bestsellers { 
        padding: 70px 5%;
         background:#FDF7F9;
         }
       .products {
         display: grid; 
         grid-template-columns: repeat(4, 1fr); 
         gap: 25px;
         }
       .product-card { 
        border: 1px solid #e0d4f7;
         border-radius: 12px;
          overflow: hidden; 
          position: relative;
           background: white;
            cursor: pointer;
             transition: 0.3s;
              box-shadow: 0 4px 20px rgba(76, 29, 149, 0.08);
             }
       .product-card:hover {
         transform: translateY(-5px); 
         box-shadow: 0 8px 25px rgba(76, 29, 149, 0.15); 
        }
       .product-card img {
         width: 100%;
          height: 260px; 
          object-fit: cover;
           background: #FDF7F9;
         }
       .wishlist {
         position: absolute; 
         top: 12px; 
         right: 12px;
          background: white;
           border-radius: 50%;
            width: 34px;
             height: 34px;
              display: flex;
               align-items: center;
                justify-content: center;
                 cursor: pointer;
                  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
                   color: #4c1d95;
                    transition: 0.3s;
                 }
       .wishlist:hover {
         background: #4c1d95;
          color: white; 
        }
       .product-info {
         padding: 18px;
         }
       .product-info h4 {
         margin-bottom: 8px; 
         font-weight: 600;
          font-size: 15px;
           color: #4c1d95;
         }
       .price { 
        color: #b8860b;
         font-weight: 700;
          font-size: 16px;
           margin-bottom: 12px;
         }
       .add-cart-btn { 
        width: 100%;
         padding: 10px;
          background: #4c1d95;
           color: white; 
           border: none;
            border-radius: 8px;
             font-size: 14px;
              font-weight: 600;
               cursor: pointer;
                transition: 0.3s;
             }
       .add-cart-btn:hover { 
        background: #b8860b;
         transform: translateY(-2px);
         }
       .footer {
         background: white;
          margin: 0 5% 30px 5%; 
          padding: 25px 30px 15px;
           border-radius: 12px;
            box-shadow: 0 4px 20px rgba(76, 29, 149, 0.08);
             border: 1px solid #e0d4f7; 
            }
       .footer-main {
         display: flex;
          justify-content: space-between;
           align-items: center; 
           flex-wrap: wrap; gap: 25px;
            padding-bottom: 20px; 
            border-bottom: 1px solid #e0d4f7; 
        }
       .footer-logo {
         display: flex;
          align-items: center;
           gap: 12px; 
        }
       .footer-logo img { 
        height: 60px; 
        border-radius: 8px;
     }
       .footer-logo p {
         font-style: italic; 
         color:#4c1d95;
          font-size: 12px; 
          line-height: 1.4;
         }
       .footer-section h4 {
         color: #4c1d95;
          margin-bottom: 10px;
           font-size: 13px;
            letter-spacing: 1px;
         }
       .footer-section ul { 
        list-style: none;
         display: flex;
          gap: 20px;
         }
       .footer-section li {
         color: #555; 
         font-size: 13px;
          cursor: pointer;
           transition: 0.3s;
         }
       .footer-section li:hover {
         color: #b8860b;
         }
       .social-icons { 
        display: flex;
         gap: 10px; 
        }
       .social-icons i {
         width: 32px;
          height: 32px; 
          border: 1px solid #b8860b;
           border-radius: 50%;
            display: flex;
             align-items: center;
              justify-content: center;
               color:#4c1d95;
                cursor: pointer;
                 font-size: 14px;
                  transition: 0.3s;
                 }
       .social-icons i:hover { 
        background: #b8860b;
         color: white;
         }
       .copyright {
         text-align: center;
          padding-top: 15px;
           color: #777;
            font-size: 12px;
         }
       .toast { 
        position: fixed;
         top: 100px;
          right: 20px;
           background: #4c1d95;
            color: white; 
            padding: 15px 25px;
             border-radius: 8px;
              box-shadow: 0 5px 15px rgba(0,0,0,0.2);
               z-index: 1000;
                display: none;
                 animation: slideIn 0.3s ease;
                 }
        @keyframes slideIn { from 
            { transform: translateX(400px);
                 opacity: 0; } to { transform: translateX(0);
                     opacity: 1; } }
        @media (max-width: 1024px) 
        {.products { grid-template-columns: repeat(3, 1fr);
         }
         .footer-main { 
            justify-content: center;
         } }
        @media (max-width: 768px) {.nav-links
             { display: none; }
             .hero h1 { font-size: 38px; }
             .hero { height: 450px; }
             .products { grid-template-columns: repeat(2, 1fr); }
             .footer-main { flex-direction: column; text-align: center; }
             .footer-section ul { flex-direction: column; gap: 8px; } }
        @media (max-width: 480px)
         {.products { grid-template-columns: 1fr; } }
    </style>
</head>

<body>
    <div class="toast" id="toast"></div>

    <nav class="navbar">
        <div class="logo">
            <img src="WhatsApp Image 2026-04-28 at 9.18.27 PM.jpeg" alt="SAAIA Store logo"/>
            <h2>SAAIA Store</h2>
        </div>
        <div class="nav-links">
            <a href="#collections">Collections</a>
            <a href="about.html">About Us</a>
            <a href="contact.html">Contact Us</a>
        </div>
        <div class="cart">
            <a href="cart.html" class="cart-link">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-count" id="cartcount">0</span>
            </a>
        </div>
    </nav>

    <section class="hero">
        <video class="hero-video" autoplay muted loop>
            <source src="WhatsApp Video 2026-04-30 at 12.12.17 AM.mp4" type="video/mp4">
        </video>
    </section>

    <section class="bestsellers" id="collections">
        <div id="collectionsContainer">
            <!-- Categories JS se aayengi -->
        </div>
    </section>

    <footer class="footer">
        <div class="footer-main">
            <div class="footer-logo">
                <img src="logo-pic.JPEG" alt="SAAIA Store Logo"/>
                <p>Five together,<br>Stronger forever. ♡</p>
            </div>
            <div class="footer-section">
                <h4>CUSTOMER CARE</h4>
                <ul><li>My Account</li><li>Track Order</li><li>FAQs</li></ul>
            </div>
            <div class="footer-section">
                <h4>FOLLOW US</h4>
                <div class="social-icons">
                    <i class="fa-brands fa-instagram"></i>
                    <i class="fa-brands fa-facebook"></i>
                    <i class="fa-brands fa-tiktok"></i>
                </div>
            </div>
        </div>
        <div class="copyright">© 2024 SAAIA Store. All Rights Reserved.</div>
    </footer>

<script>
function addToCart(price, image) {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let found = cart.find(item => item.image === image);
    if(found) { found.qty += 1; }
    else { cart.push({price: price, image: image, qty: 1}); }
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
    showToast('Product added to cart!');
}

function updateCartCount() {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
    document.getElementById('cartcount').innerText = totalQty;
}

function showToast(message) {
    let toast = document.getElementById('toast');
    toast.innerText = message;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 2500);
}

function loadProducts() {
    let products = JSON.parse(localStorage.getItem('products')) || [];
    let container = document.getElementById('collectionsContainer');

    if(products.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:#777;padding:40px;">No products added yet. Add products from Admin Panel.</p>';
        return;
    }

    // Categories order: shoes, bags, makeup, jewellery, clothes
    const categoryOrder = ['clothes', 'shoes', 'bags', 'makeup', 'jewellery'];
    const categoryNames = {
        clothes: 'Clothes Collection',
        shoes: 'Shoes Collection',
        bags: 'Bags Collection',
        makeup: 'Makeup Collection',
        jewellery: 'Jewellery Collection'
    };

    let html = '';
    categoryOrder.forEach(cat => {
        let catProducts = products.filter(p => p.category === cat);
        if(catProducts.length > 0) {
            html += `
            <div class="section-header">
                <div class="section-title">
                    
                    <h2>${categoryNames[cat]}</h2>
                </div>
            </div>
            <div class="products">
                ${catProducts.map((p, i) => `
                <div class="product-card">
                    <img src="${p.image}" alt="${cat} ${i+1}">
                    <div class="wishlist" onclick="event.stopPropagation();">
                        <i class="fa-regular fa-heart"></i>
                    </div>
                    <div class="product-info">
                        <h4>${cat.charAt(0).toUpperCase() + cat.slice(1)} ${i+1}</h4>
                        <p class="price">PKR ${Number(p.price).toLocaleString()}</p>
                        <button class="add-cart-btn" onclick="event.stopPropagation(); addToCart(${p.price}, '${p.image}')">
                            <i class="fa-solid fa-cart-plus"></i> Add to Cart
                        </button>
                    </div>
                </div>
                `).join('')}
            </div>
            `;
        }
    });

    container.innerHTML = html;
}

window.onload = function() {
    updateCartCount();
    loadProducts();
}
</script>
</body>
</html>
