<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - SAAIA Store</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
* {
     margin: 0;
      padding: 0;
       box-sizing: border-box; 
    }
body {
     font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #FDF7F9 0%, #f3e8ff 100%);
       min-height: 100vh;
        color: #4c1d95;
     }
.container { 
    max-width: 1200px;
     margin: 40px auto; 
     background: white;
      padding: 40px;
       border-radius: 16px;
        box-shadow: 0 10px 40px rgba(76, 29, 149, 0.12); 
        border: 1px solid #e0d4f7;
     }
#loginSec {
     text-align: center;
      padding: 20px;
     }
#loginSec h2 {
     font-size: 32px; 
     margin-bottom: 30px; 
     color: #4c1d95;
    }
#loginSec input {
     max-width: 400px;
      margin: 0 auto 15px;
     }
h2, h3 {
    color: #4c1d95; 
    margin: 0 0 20px 0; 
}
h2 {
     font-size: 28px;
     }
h3 { 
    font-size: 20px;
     color: #b8860b;
     }
input, button, select {
     width: 100%;
      padding: 14px;
       margin-top: 10px;
       border-radius: 10px;
        border: 2px solid #e0d4f7;
         font-family: 'Poppins', sans-serif;
          font-size: 15px; 
          transition: 0.3s;
         }
input:focus, select:focus {
     outline: none;
      border-color: #b8860b;
       box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.1);
     }
button { 
    background: linear-gradient(135deg, #4c1d95 0%, #6b46c1 100%);
     color: white; border: none;
      cursor: pointer;
       font-weight: 600;
        transition: all 0.3s ease;
     }
button:hover {
    background: linear-gradient(135deg, #b8860b 0%, #d4a017 100%); transform: translateY(-2px);
     box-shadow: 0 5px 15px rgba(184, 134, 11, 0.3); 
    }
.hidden {
     display: none; 
    }
.nav {
     display: flex;
      gap: 12px;
       margin-bottom: 30px;
        border-bottom: 2px solid #e0d4f7;
         padding-bottom: 20px;
        }
.nav button { flex: 1; 
    background: #f8f5ff; 
    color: #4c1d95; 
    border: 2px solid transparent;
 }
.nav button.active { 
    background: linear-gradient(135deg, #4c1d95 0%, #6b46c1 100%);
     color: white; 
    }
.product-item {
     display: flex; align-items: center;
     gap: 20px; 
     padding: 20px;
      background: #faf9fb;
       border-radius: 12px;
        margin-bottom: 15px;
         border: 1px solid #e0d4f7; 
         transition: 0.3s; 
        }
.product-item:hover { 
    border-color: #b8860b; 
    box-shadow: 0 4px 15px rgba(184, 134, 11, 0.15);
 }
.product-item img { 
    width: 70px;
     height: 70px;
      object-fit: cover; 
      border-radius: 10px;
       border: 2px solid #e0d4f7;
     }
.product-item span {
     flex: 1;
     
     font-weight: 600; 
     font-size: 16px; 
    }
.product-item.category-tag {
     background: #f3e8ff;
      color: #4c1d95;
       padding: 5px 12px; 
       border-radius: 20px; 
       font-size: 12px; 
       font-weight: 600;
     }
.del { 
    background: #dc3545;
     width: auto;
      padding: 10px 18px;
     }
.edit {
     background: #28a745;
      width: auto; 
      padding: 10px 18px;
     }
.top { 
    display: flex; 
    align-items: center;
     margin-bottom: 30px;
      padding-bottom: 20px;
       border-bottom: 2px solid #e0d4f7;
     }
.logout { 
    width: auto; 
    padding: 10px 20px;
     background: #6c757d;
      margin-left: auto; 
    }
.error { 
    color: #dc3545; 
    text-align: center; 
    display: none;
     font-weight: 500;
     }
.table-container {
     overflow-x: auto;
      border-radius: 12px; 
      border: 2px solid #e0d4f7;
     }
.order-table {
     width: 100%;
      border-collapse: collapse;
       background: white;
     }
.order-table thead {
     background: linear-gradient(135deg, #4c1d95 0%, #6b46c1 100%); color: white; 
    }
.order-table th {
     padding: 16px 12px;
      text-align: left; 
      font-weight: 600;
       font-size: 14px;
     }
.order-table tbody tr { 
    border-bottom: 1px solid #e0d4f7; 
    transition: 0.2s;
 }
.order-table tbody tr:hover {
     background: #faf9fb; 
    }
.order-table td { 
    padding: 16px 12px;
     font-size: 14px;
     }
.status-badge {
     padding: 6px 12px; 
     border-radius: 20px; 
     font-size: 12px; 
     font-weight: 600;
      display: inline-block;
     }
.status-pending {
     background: #fff3e0;
      color: #f57c00; 
    }
.status-delivered {
     background: #e8f5e9; 
     color: #388e3c;
     }
.empty-state {
     text-align: center;
      padding: 60px 20px;
       color: #777; 
    }
.empty-state i { 
    font-size: 48px;
     color: #e0d4f7; 
     margin-bottom: 15px;
     }
.section-icon {
     margin-right: 10px;
      color: #b8860b; 
    }

/* Stats Cards */
.stats-container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    margin-bottom: 30px;
}
.stat-card {
    background: linear-gradient(135deg, #4c1d95 0%, #6b46c1 100%);
    color: white;
    padding: 25px;
    border-radius: 12px;
    text-align: center;
}
.stat-card h4 {
    font-size: 14px;
    opacity: 0.9;
    margin-bottom: 10px;
}
.stat-card h2 {
    font-size: 32px;
    color: white;
    margin: 0;
}
.order-img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }

@media (max-width: 768px) {
 .container { margin: 20px; padding: 25px; }
 .stats-container { grid-template-columns: 1fr; }
 .order-table { font-size: 12px; }
 .order-table th,.order-table td { padding: 10px 8px; }
}
</style>
</head>
<body>
<div class="container">
    <div id="loginSec">
        <h2><i class="fa-solid fa-lock section-icon"></i>Admin Login</h2>
        <input type="password" id="pass" placeholder="Enter Password">
        <p class="error" id="err">Wrong password! Try again.</p>
        <button onclick="login()"><i class="fa-solid fa-sign-in-alt"></i> Login</button>
    </div>

    <div id="adminSec" class="hidden">
        <div class="top">
            <h2 style="margin:0;"><i class="fa-solid fa-gauge section-icon"></i>Admin Panel</h2>
            <button class="logout" onclick="logout()"><i class="fa-solid fa-sign-out-alt"></i> Logout</button>
        </div>

        <div class="nav">
            <button id="tabOrder" class="active" onclick="showTab('order')"><i class="fa-solid fa-shopping-cart"></i> Orders</button>
            <button id="tabProd" onclick="showTab('product')"><i class="fa-solid fa-box"></i> Products</button>
        </div>

        <div id="orderTab">
            <!-- Stats Cards -->
            <div class="stats-container">
                <div class="stat-card">
                    <h4><i class="fa-solid fa-shopping-bag"></i> Total Orders</h4>
                    <h2 id="totalOrders">0</h2>
                </div>
                <div class="stat-card">
                    <h4><i class="fa-solid fa-wallet"></i> Total Revenue</h4>
                    <h2 id="totalRevenue">PKR 0</h2>
                </div>
            </div>

            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                <h3><i class="fa-solid fa-receipt section-icon"></i>All Orders</h3>
                <button onclick="clearOrders()" style="width:auto;background:#dc3545;padding:10px 20px;"><i class="fa-solid fa-trash"></i> Clear All</button>
            </div>
            <div id="orderList"></div>
        </div>

        <div id="productTab" class="hidden">
            <h3><i class="fa-solid fa-plus-circle section-icon"></i>Add Product</h3>
            <input type="file" id="img" accept="image/*">
            <input type="number" id="price" placeholder="Price PKR">
            <select id="category">
                <option value="">Select Category</option>
                <option value="clothes">Clothes</option>
                <option value="shoes">Shoes</option>
                <option value="bags">Bags</option>
                <option value="makeup">Makeup</option>
                <option value="jewellery">Jewellery</option>
            </select>
            <button onclick="addProduct()"><i class="fa-solid fa-plus"></i> Add Product</button>

            <h3 style="margin-top:40px;"><i class="fa-solid fa-list section-icon"></i>Products</h3>
            <div id="prodList"></div>
        </div>
    </div>
</div>

<script>
const ADMIN_PASS = 'admin123';
let editIndex = -1;

window.onload = function(){
    if(localStorage.getItem('loggedIn')==='true'){
        showAdmin();
        showTab('order');
    }
}

function login(){
    let pass = document.getElementById('pass').value;
    if(pass===ADMIN_PASS){
        localStorage.setItem('loggedIn','true');
        showAdmin();
        showTab('order');
    }else{
        document.getElementById('err').style.display='block';
    }
}

function showAdmin(){
    document.getElementById('loginSec').classList.add('hidden');
    document.getElementById('adminSec').classList.remove('hidden');
    loadProducts();
    loadOrders();
}

function logout(){
    localStorage.removeItem('loggedIn');
    location.reload();
}

function showTab(tab){
    document.getElementById('productTab').classList.add('hidden');
    document.getElementById('orderTab').classList.add('hidden');
    document.getElementById('tabProd').classList.remove('active');
    document.getElementById('tabOrder').classList.remove('active');
    if(tab==='product'){
        document.getElementById('productTab').classList.remove('hidden');
        document.getElementById('tabProd').classList.add('active');
        loadProducts();
    }else{
        document.getElementById('orderTab').classList.remove('hidden');
        document.getElementById('tabOrder').classList.add('active');
        loadOrders();
    }
}

function addProduct(){
    let file = document.getElementById('img').files[0];
    let price = document.getElementById('price').value;
    let category = document.getElementById('category').value;
    if(!price ||!category){alert('Price aur category dalo');return;}

    if(editIndex > -1) {
        // Update existing product
        let prods = JSON.parse(localStorage.getItem('products'))||[];
        prods[editIndex].price = price;
        prods[editIndex].category = category;
        if(file) {
            let reader = new FileReader();
            reader.onload = function(e){
                prods[editIndex].image = e.target.result;
                saveAndReset(prods);
            }
            reader.readAsDataURL(file);
        } else {
            saveAndReset(prods);
        }
    } else {
        // Add new product
        if(!file){alert('Image select karo');return;}
        let reader = new FileReader();
        reader.onload = function(e){
            let prods = JSON.parse(localStorage.getItem('products'))||[];
            prods.push({image:e.target.result,price:price,category:category});
            saveAndReset(prods);
        }
        reader.readAsDataURL(file);
    }
}

function saveAndReset(prods){
    localStorage.setItem('products',JSON.stringify(prods));
    loadProducts();
    document.getElementById('img').value='';
    document.getElementById('price').value='';
    document.getElementById('category').value='';
    editIndex = -1;
    document.querySelector('#productTab button').innerHTML = '<i class="fa-solid fa-plus"></i> Add Product';
}

function editProduct(i){
    let prods = JSON.parse(localStorage.getItem('products'));
    let p = prods[i];
    editIndex = i;
    document.getElementById('price').value = p.price;
    document.getElementById('category').value = p.category;
    document.querySelector('#productTab button').innerHTML = '<i class="fa-solid fa-save"></i> Update Product';
    window.scrollTo({top:0, behavior:'smooth'});
}

function loadProducts(){
    let prods = JSON.parse(localStorage.getItem('products'))||[];
    document.getElementById('prodList').innerHTML = prods.length==0?
    '<div class="empty-state"><i class="fa-solid fa-box-open"></i><p>No products added yet</p></div>' :
    prods.map((p,i)=>`
        <div class="product-item">
            <img src="${p.image}">
            <span>PKR ${Number(p.price).toLocaleString()}</span>
            <span class="category-tag">${p.category}</span>
            <button class="edit" onclick="editProduct(${i})"><i class="fa-solid fa-edit"></i> Edit</button>
            <button class="del" onclick="delProd(${i})"><i class="fa-solid fa-trash"></i> Delete</button>
        </div>
    `).join('');
}

function delProd(i){
    if(confirm('Delete this product?')){
        let prods = JSON.parse(localStorage.getItem('products'));
        prods.splice(i,1);
        localStorage.setItem('products',JSON.stringify(prods));
        loadProducts();
    }
}

function loadOrders(){
    let orders = JSON.parse(localStorage.getItem('orders'))||[];

    // Update stats
    document.getElementById('totalOrders').innerText = orders.length;
    let totalRevenue = orders.reduce((sum, o) => sum + Number(o.total || 0), 0);
    document.getElementById('totalRevenue').innerText = 'PKR ' + totalRevenue.toLocaleString();

    if(orders.length==0){
        document.getElementById('orderList').innerHTML ='<div class="empty-state"><i class="fa-solid fa-inbox"></i><p>No orders yet</p></div>';
        return;
    }

    let table = `<div class="table-container"><table class="order-table">
        <thead>
            <tr>
                <th>Image</th>
                <th>Product</th>
                <th>Date & Time</th>
                <th>Price</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>`;

    orders.forEach((o,i)=> {
        if(o.items && o.items.length > 0) {
            o.items.forEach((item, idx) => {
                table += `
                <tr>
                    <td><img src="${item.image}" class="order-img"></td>
                    <td>Product ${idx+1}</td>
                    <td>${o.date || 'N/A'}<br><small style="color:#777;">${o.time || ''}</small></td>
                    <td>PKR ${Number(item.price).toLocaleString()}</td>
                    <td><span class="status-badge status-${(o.status || 'pending').toLowerCase()}">${o.status || 'Pending'}</span></td>
                    <td>
                        <select style="width:auto;padding:8px 12px;" onchange="updateStatus(${i}, this.value)">
                            <option ${o.status==='Pending'?'selected':''}>Pending</option>
                            <option ${o.status==='Delivered'?'selected':''}>Delivered</option>
                        </select>
                    </td>
                </tr>`;
            });
        }
    });

    table += '</tbody></table></div>';
    document.getElementById('orderList').innerHTML = table;
}

function updateStatus(index, status){
    let orders = JSON.parse(localStorage.getItem('orders'));
    orders[index].status = status;
    localStorage.setItem('orders',JSON.stringify(orders));
    loadOrders();
}

function clearOrders(){
    if(confirm('Sab orders delete karne hain? This cannot be undone.')){
        localStorage.removeItem('orders');
        loadOrders();
    }
}
</script>
</body>
</html>
